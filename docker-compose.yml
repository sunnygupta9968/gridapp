version: '3.8'

services:
  # 1. PostgreSQL Database Service
  db:
    image: postgres:15
    container_name: grid_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: gridappdb
    ports:
      - "5433:5432"
    restart: unless-stopped

  # 2. Redis Service
  redis:
    image: redis:7
    container_name: grid_redis
    ports:
      - "6379:6379"
    restart: unless-stopped